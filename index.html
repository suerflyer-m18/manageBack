<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稼ぎ帳</title>

<style>
body {
  font-family: "Courier New", monospace;
  margin: 0;
  padding: 10px;
  background: #ccff99;
}

.container {
  max-width: 480px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 12px;
}

.tab {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

.tab button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #1a73e8;
  color: white;
}

.row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

input {
  width: 120px;
  padding: 8px;
  font-size: 16px;
  text-align: right; /* ★右寄せ */
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #1a73e8;
  color: white;
  margin-top: 5px;
}

.result {
  margin-top: 20px;
  padding: 10px;
  background: #f0f4ff;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
}

td.amount { text-align: right; }

.hidden { display:none; }

.undo { background:#ff9800; }

.nav {
  display:flex;
  align-items:center;
  justify-content: space-between;
  margin:10px 0;
}

.nav button {
  width:60px;
  padding:6px;
}

#currentMonth {
  flex:1;
  text-align:center;
  font-weight:bold;
  white-space: nowrap;
}

.master {
  margin-top: 30px;
  font-size: 14px;
  background: #fafafa;
  padding: 15px;
  border-radius: 10px;
}

.master .row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.master input {
  width: 100px;
  text-align: right;
  margin-left: auto; /* ★これがポイント */
}
</style>
</head>

<body>

<div class="container">

<div class="tab">
  <button onclick="showTab('calc')">バック計算</button>
  <button onclick="showTab('list')">明細</button>
  <button onclick="showTab('monthly')">月別集計</button>
</div>

<div id="calc">

<h2>バック計算</h2>

<div class="row">40分 <input type="number" id="c40"></div>
<div class="row">60分 <input type="number" id="c60"></div>
<div class="row">80分 <input type="number" id="c80"></div>
<div class="row">100分 <input type="number" id="c100"></div>
<div class="row">120分 <input type="number" id="c120"></div>

<hr>

<div class="row">指名 <input type="number" id="shimei"></div>
<div class="row">オプション <input type="number" id="option"></div>
<div class="row">金額補正 <input type="number" id="adjust"></div>

<div class="result">
<table>
<tr><th>項目</th><th>金額</th></tr>
<tr><td>元合計</td><td id="baseTotal" class="amount">¥0</td></tr>
<tr><td>雑費</td><td id="expense" class="amount">¥0</td></tr>
<tr><td><b>最終合計</b></td><td id="finalTotal" class="amount">¥0</td></tr>
<tr><td>当月合計</td><td id="monthTotal" class="amount">¥0</td></tr>
</table>
</div>

<div class="row">日付 <input type="date" id="saveDate"></div>
<button onclick="saveData()">保存</button>

<div class="master">
<strong>▼ マスタ金額</strong><br><br>

<div class="row">40分 <input type="number" id="m40" value="9500"></div>
<div class="row">60分 <input type="number" id="m60" value="14000"></div>
<div class="row">80分 <input type="number" id="m80" value="18000"></div>
<div class="row">100分 <input type="number" id="m100" value="24000"></div>
<div class="row">120分 <input type="number" id="m120" value="31000"></div>

<br>

<div class="row">指名 <input type="number" id="mShimei" value="4000"></div>
<div class="row">オプション <input type="number" id="mOption" value="1000"></div>
</div>

</div>

<div id="list" class="hidden">
<h2>明細</h2>

<div class="nav">
  <button onclick="changeMonth(-1)">＜</button>
  <div id="currentMonth"></div>
  <button onclick="changeMonth(1)">＞</button>
</div>

<table>
<thead>
<tr><th>日付</th><th>金額</th><th>削除</th></tr>
</thead>
<tbody id="detailList"></tbody>
</table>

<button class="undo hidden" id="undoBtn" onclick="undoDelete()">削除を取り消す</button>
<button onclick="exportCSV()">CSVエクスポート</button>
</div>

<div id="monthly" class="hidden">
<h2>月別集計</h2>
<canvas id="chart"></canvas>

<table>
<thead>
<tr><th>年月</th><th>金額</th></tr>
</thead>
<tbody id="monthlyList"></tbody>
</table>
</div>

</div>

<script>

let lastDeleted=null;
let viewMonth=new Date();

function formatYen(num){
  return "¥"+Number(num).toLocaleString();
}

function calculate(){
  let base =
    (c40.value||0)*m40.value +
    (c60.value||0)*m60.value +
    (c80.value||0)*m80.value +
    (c100.value||0)*m100.value +
    (c120.value||0)*m120.value +
    (shimei.value||0)*mShimei.value +
    (option.value||0)*mOption.value;

  let exp=Math.floor((base*0.05)/500)*500;
  if(exp>5000) exp=5000;

  let final=base-exp+Number(adjust.value||0);

  baseTotal.innerText=formatYen(base);
  expense.innerText=formatYen(exp);
  finalTotal.innerText=formatYen(final);

  updateMonthTotal();
}

document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input",calculate);
});

function saveData(){
  const data=JSON.parse(localStorage.getItem("data")||"[]");
  const date=saveDate.value;
  const amount=Number(finalTotal.innerText.replace(/[^0-9]/g,''));

  const idx=data.findIndex(d=>d.date===date);
  if(idx>=0){data[idx].amount=amount;}
  else{data.push({date,amount});}

  localStorage.setItem("data",JSON.stringify(data));

  loadList();loadMonthly();updateMonthTotal();
}

function loadList(){
  const data=JSON.parse(localStorage.getItem("data")||"[]");

  const ym=viewMonth.toISOString().slice(0,7);
  currentMonth.innerText=ym;

  const filtered=data
    .map((d,i)=>({...d,index:i}))
    .filter(d=>d.date.startsWith(ym))
    .sort((a,b)=>a.date.localeCompare(b.date));

  detailList.innerHTML=filtered.map(d=>`
    <tr>
      <td>${d.date}</td>
      <td class="amount">${formatYen(d.amount)}</td>
      <td><button onclick="deleteData(${d.index})">削除</button></td>
    </tr>
  `).join("");
}

function changeMonth(diff){
  viewMonth.setMonth(viewMonth.getMonth()+diff);
  loadList();
}

function deleteData(index){
  const data=JSON.parse(localStorage.getItem("data")||"[]");

  if(!confirm("削除しますか？"))return;

  lastDeleted={...data[index],index};
  data.splice(index,1);

  localStorage.setItem("data",JSON.stringify(data));
  undoBtn.classList.remove("hidden");

  loadList();loadMonthly();updateMonthTotal();
}

function undoDelete(){
  if(!lastDeleted)return;

  const data=JSON.parse(localStorage.getItem("data")||"[]");
  data.splice(lastDeleted.index,0,lastDeleted);

  localStorage.setItem("data",JSON.stringify(data));

  lastDeleted=null;
  undoBtn.classList.add("hidden");

  loadList();loadMonthly();updateMonthTotal();
}

/* ★CSV昇順 */
function exportCSV(){
  const data=JSON.parse(localStorage.getItem("data")||"[]");

  const sorted = data.sort((a,b)=>a.date.localeCompare(b.date));

  let csv="日付,金額\n";
  sorted.forEach(d=>csv+=`${d.date},${d.amount}\n`);

  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.csv";
  a.click();
}

function updateMonthTotal(){
  const data=JSON.parse(localStorage.getItem("data")||"[]");
  const now=new Date().toISOString().slice(0,7);
  let sum=0;
  data.forEach(d=>{if(d.date.startsWith(now))sum+=d.amount;});
  monthTotal.innerText=formatYen(sum);
}

function loadMonthly(){
  const data=JSON.parse(localStorage.getItem("data")||"[]");
  const map={};

  data.forEach(d=>{
    const m=d.date.slice(0,7);
    map[m]=(map[m]||0)+d.amount;
  });

  const sorted=Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));

  monthlyList.innerHTML=sorted.map(([k,v])=>`
    <tr>
      <td>${k}</td>
      <td class="amount">${formatYen(v)}</td>
    </tr>
  `).join("");

  drawChart(Object.fromEntries(sorted));
}

function drawChart(map){
  const canvas=document.getElementById("chart");
  const ctx=canvas.getContext("2d");
  canvas.width=320;
  canvas.height=200;

  ctx.clearRect(0,0,320,200);

  const keys=Object.keys(map);
  const values=Object.values(map);
  const max=Math.max(...values,1);

  ctx.fillStyle="#ccff99";

  keys.forEach((k,i)=>{
    const x=i*40;
    const h=(values[i]/max)*150;

    ctx.fillRect(x,180-h,25,h);

    ctx.fillStyle="#000";
    ctx.fillText((values[i]/10000).toFixed(1)+"万",x,170-h);
    ctx.fillText(k,x,195);

    ctx.fillStyle="#ccff99";
  });
}

function showTab(id){
  calc.classList.add("hidden");
  list.classList.add("hidden");
  monthly.classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");

  if(id==="list") loadList();
  if(id==="monthly") loadMonthly();
}

saveDate.value=new Date().toISOString().split("T")[0];
calculate();

</script>

</body>
</html>
